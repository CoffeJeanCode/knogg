name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: knogg-linux-amd64
            bin: knogg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: knogg-windows-amd64.exe
            bin: knogg.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: knogg-macos-amd64
            bin: knogg
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: knogg-macos-arm64
            bin: knogg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} artifacts/${{ matrix.asset_name }}
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x artifacts/${{ matrix.asset_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          for f in */*; do
            (cd "$(dirname "$f")" && sha256sum "$(basename "$f")") >> ../SHA256SUMS
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*/*
            SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
