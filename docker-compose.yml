services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_BACKTRACE=1
    stdin_open: true
    tty: true

  knogg:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    entrypoint: ["knogg"]

  hub:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5050:5050"
    entrypoint: ["cargo", "run", "--", "hub", "--port", "5050"]
    environment:
      - RUST_BACKTRACE=1

volumes:
  cargo-cache:
  target-cache:
