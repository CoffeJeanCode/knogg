guides:
- commits:
  - Conventional Commits (feat:, fix:, refactor:, chore:, docs:)
  - One logical change per commit; keep diffs review-sized
  dependencies:
  - clap 4 derive, serde/serde_yaml, minijinja 2, tokio, anyhow
  - Add deps only with architect sign-off
  docs:
  - Module-level //! doc on every command module
  - /// doc comment on every pub fn, struct, enum and trait
  - README human-facing; AGENTS.md / adapters agent-facing — generated, do not hand-edit
  edition: '2021'
  errors:
  - anyhow::Result at command and CLI boundaries
  - .context()/.with_context() on every I/O and parse failure
  - bail! for user-facing validation errors
  - 'No unwrap()/expect() outside #[cfg(test)] — propagate with ?'
  formatting:
  - Enforced by `make lint` (cargo fmt --check) — not manual; CI rejects unformatted code
  - rustfmt.toml pinned at repo root; do not deviate from it
  lang: rust
  lint:
  - '`cargo clippy --all-targets -- -D warnings` must pass; clippy.toml pinned at root'
  - '`make check` (lint + test) is the gate for every track and PR'
  naming:
  - 'Modules/files: snake_case'
  - 'Types/traits: PascalCase'
  - 'Functions: snake_case; CLI entrypoints named cmd_* in command modules'
  - 'Constants: SCREAMING_SNAKE_CASE'
  safety:
  - All vault writes under VaultLock + atomic_write
  - Reject .. in paths; MCP bounds paths to vault root
  - Never mutate active_context from MCP without a staged proposal
  structure:
  - One command per file under src/commands/; keep modules under ~300 lines, split when larger
  - src/core for vault I/O, src/mcp for the JSON-RPC server — no cross-layer leakage
  - File ownership follows master_plan task globs; doctor overlap check enforces no two agents in one file
  tests:
  - 'Unit tests colocated in #[cfg(test)] mod tests at module bottom'
  - Temp dirs under std::env::temp_dir() with unique labels
  - New behaviour ships with a test; run via make check
