# tool registry: template -> output mappings for `knogg sync`
tools:
  - name: cursor
    template: adapters/cursor_prompt.md
    output: .cursorrules
  - name: claude
    template: adapters/claude_code.md
    output: .claude/context.md
  - name: opencode
    template: adapters/opencode_prompt.md
    output: AGENTS.md
