add_task:
  stage: Stage 7 — Communication & proposal hygiene
  task:
    id: 7F
    owner: cursor
    desc: 'Bulk multi-id actions: apply/reject/show/ack accept variadic ids; best-effort with per-item report + nonzero exit on any failure; single VaultLock per batch; after_proposal_apply hook fires once. Variadic clap signatures land in 7-pre (cli.rs).'
